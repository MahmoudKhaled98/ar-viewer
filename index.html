<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- ARCHIVO FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Archivo', sans-serif;
      background: #2a2d32;
      color: #eef6d1;
    }

    /* HEADER */
    header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-weight: 600;
      font-size: 28px;
      color: #eef6d1;
    }

    /* EXTERNAL SVG LOGO FILE */
    .logo {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px #eef6d1);
    }

    .container {
      padding: 10px 20px;
      text-align: center;
    }

    /* VIEWER */
    model-viewer {
      width: 100%;
      height: 70vh;
      border-radius: 20px;
      background: #1f2226;
      box-shadow:
        0 0 40px rgba(238,246,209,0.08),
        0 0 120px rgba(0,0,0,0.9);
    }

    /* UPLOAD */
    .upload {
      margin: 20px 0;
    }

    #fileInput {
      display: none;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 14px 22px;
      border-radius: 14px;

      background: #1f2226;
      border: 1px solid #eef6d1;
      color: #eef6d1;

      font-weight: 500;
      font-size: 16px;

      cursor: pointer;
      transition: 0.25s ease;

      box-shadow: 0 0 20px rgba(238,246,209,0.1);
    }

    .upload-btn:hover {
      background: #eef6d1;
      color: #2a2d32;
      transform: scale(1.05);
    }

    /* AR BUTTON */
    .ar-btn {
      margin-top: 15px;
      display: inline-block;
      padding: 12px 20px;
      border-radius: 12px;

      background: #c8f31d;
      color: #2a2d32;
      font-weight: 600;

      cursor: pointer;

      box-shadow: 0 0 20px #c8f31d;
      transition: 0.2s;
    }

    .ar-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 35px #c8f31d;
    }

    .cta {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    /* POPUP */
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-box {
      background: #1f2226;
      border: 1px solid #c8f31d;
      color: #eef6d1;
      padding: 20px;
      border-radius: 12px;
      max-width: 300px;
      text-align: center;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="left">
    <img class="logo" src="logo.svg" alt="logo" />
  </div>

  <div class="title">AR Viewer</div>
</header>

<div class="container">

  <!-- UPLOAD -->
  <div class="upload">
    <label for="fileInput" class="upload-btn">
      📁 Upload 3D Model
    </label>
    <input type="file" id="fileInput" accept=".glb,.gltf" />
  </div>

  <!-- VIEWER -->
  <model-viewer
    id="viewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate>
  </model-viewer>

  <div class="cta">
    Experience products in real space using AR
  </div>

  <!-- AR BUTTON -->
  <div class="ar-btn" id="arButton">
    View in AR
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    📱 Open this on your phone to use AR mode
  </div>
</div>

<script>
  const input = document.getElementById("fileInput");
  const viewer = document.getElementById("viewer");
  const arButton = document.getElementById("arButton");
  const popup = document.getElementById("popup");

  input.addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;

    viewer.src = URL.createObjectURL(file);
  });

  function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  arButton.addEventListener("click", () => {
    if (isMobile()) {
      viewer.activateAR?.();
    } else {
      popup.classList.remove("hidden");
      setTimeout(() => popup.classList.add("hidden"), 2500);
    }
  });
</script>

</body>
</html>
