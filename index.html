<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaLumina Tech AR </title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Futuristic font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 20px;
      letter-spacing: 2px;
      color: #a6ff00;
      text-shadow: 0 0 15px #a6ff00;
    }

    .container {
      padding: 10px 20px;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      border-radius: 20px;
      background: #111;
      box-shadow:
        0 0 40px rgba(166,255,0,0.15),
        0 0 120px rgba(0,0,0,0.9);
    }

    /* Upload section */
    .upload {
      margin: 20px 0;
    }

    #fileInput {
      display: none;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;

      padding: 14px 22px;
      border-radius: 14px;

      background: black;
      border: 1px solid #a6ff00;
      color: #a6ff00;

      font-weight: 600;
      font-size: 14px;

      cursor: pointer;

      box-shadow:
        0 0 20px rgba(166,255,0,0.2),
        0 0 60px rgba(0,0,0,0.8);

      transition: 0.25s ease;
    }

    .upload-btn:hover {
      background: #a6ff00;
      color: black;
      transform: scale(1.05);
      box-shadow:
        0 0 25px #a6ff00,
        0 0 80px rgba(166,255,0,0.5);
    }

    .cta {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.7;
    }

    .ar-btn {
      margin-top: 15px;
      display: inline-block;
      padding: 12px 20px;
      border-radius: 12px;

      background: #a6ff00;
      color: black;
      font-weight: bold;

      cursor: pointer;

      box-shadow:
        0 0 20px #a6ff00,
        0 0 60px rgba(166,255,0,0.4);

      transition: 0.2s;
    }

    .ar-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 30px #a6ff00,
        0 0 80px rgba(166,255,0,0.6);
    }

  </style>
</head>

<body>

<header>
  ❒ NovaLumina Tech AR Product Viewer
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload">
    <label for="fileInput" class="upload-btn">
      📁 Upload 3D Model
    </label>
    <input type="file" id="fileInput" accept=".glb,.gltf" />
  </div>

  <!-- AR Viewer -->
  <model-viewer
    id="viewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>

  <div class="cta">
    Experience your product in real space
  </div>

  <div class="ar-btn" id="arButton">
    👁️ View in Augmented Reality
  </div>

</div>

<script>
  const input = document.getElementById("fileInput");
  const viewer = document.getElementById("viewer");
  const arButton = document.getElementById("arButton");

  // Load GLB file
  input.addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    viewer.src = url;
  });

  // Trigger AR mode
  arButton.addEventListener("click", () => {
    if (viewer.activateAR) {
      viewer.activateAR();
    } else {
      alert("AR not supported on this device/browser");
    }
  });
</script>

</body>
</html>
