<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Archivo', sans-serif;
      background: #2a2d32;
      color: #eef6d1;
    }

    header {
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      border-radius: 20px;
      background: #1f2226;
    }

    .upload-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #1f2226;
      border: 1px solid #eef6d1;
      color: #eef6d1;
      cursor: pointer;
    }

    .upload-btn:hover {
      background: #eef6d1;
      color: #2a2d32;
    }

    input {
      display: none;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0;
      transition: 0.3s ease;
    }

    .hint.show {
      opacity: 0.8;
    }

    .ar-btn {
      margin-top: 15px;
      padding: 12px 20px;
      background: #c8f31d;
      color: #2a2d32;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      display: inline-block;
    }
  </style>
</head>

<body>

<header>
  <div class="title">AR Viewer</div>
</header>

<div class="container">

  <!-- SINGLE UPLOAD BUTTON -->
  <label class="upload-btn" for="fileInput" id="uploadBtn">
    📁 Upload 3D Model
  </label>

  <input type="file" id="fileInput" accept=".glb,.gltf,.usdz" />

  <!-- HINT (hidden until click) -->
  <div class="hint" id="hintText"></div>

  <model-viewer
    id="viewer"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate>
  </model-viewer>

  <div class="ar-btn" id="arButton">
    View in AR
  </div>

</div>

<script>
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");
  const hintText = document.getElementById("hintText");
  const viewer = document.getElementById("viewer");

  function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function isAndroid() {
    return /Android/i.test(navigator.userAgent);
  }

  // SHOW HINT ONLY AFTER CLICK
  uploadBtn.addEventListener("click", () => {
    if (isIOS()) {
      hintText.textContent = "📱 iPhone detected → upload .USDZ for AR";
    } else if (isAndroid()) {
      hintText.textContent = "🤖 Android detected → upload .GLB / .GLTF";
    } else {
      hintText.textContent = "💻 Use .GLB/.GLTF for preview, .USDZ for iOS AR";
    }

    hintText.classList.add("show");
  });

  // FILE HANDLING
  fileInput.addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const ext = file.name.split(".").pop().toLowerCase();

    if (ext === "usdz") {
      viewer.setAttribute("ios-src", URL.createObjectURL(file));
    } else {
      viewer.src = URL.createObjectURL(file);
    }
  });

  // AR BUTTON
  document.getElementById("arButton").addEventListener("click", () => {
    if (/iPhone|iPad|Android/i.test(navigator.userAgent)) {
      viewer.activateAR?.();
    } else {
      alert("Open on mobile for AR experience");
    }
  });
</script>

</body>
</html>
